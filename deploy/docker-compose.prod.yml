name: learnword

services:
  learnword.webapi:
    image: ${LW_IMAGE_PREFIX:-learnword}/learnword-webapi:${LW_IMAGE_TAG:?Set LW_IMAGE_TAG in .env}
    platform: ${LW_PLATFORM:-linux/amd64}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__LwConnection: Host=${LW_DB_HOST:-192.168.0.6};Port=${LW_DB_PORT:-5432};Database=${LW_DB_NAME:-lwdb};Username=${LW_DB_USER:?Set LW_DB_USER in .env};Password=${LW_DB_PASSWORD:?Set LW_DB_PASSWORD in .env}
    expose:
      - "8080"

  learnword.identity:
    image: ${LW_IMAGE_PREFIX:-learnword}/learnword-identity:${LW_IMAGE_TAG:?Set LW_IMAGE_TAG in .env}
    platform: ${LW_PLATFORM:-linux/amd64}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__LwConnection: Host=${LW_DB_HOST:-192.168.0.6};Port=${LW_DB_PORT:-5432};Database=${LW_DB_NAME:-lwdb};Username=${LW_DB_USER:?Set LW_DB_USER in .env};Password=${LW_DB_PASSWORD:?Set LW_DB_PASSWORD in .env}
      JwtSettings__Issuer: ${LW_JWT_ISSUER:-LearnWordIdentity}
      JwtSettings__Audience: ${LW_JWT_AUDIENCE:-learnword.online}
      JwtSettings__Key: ${LW_JWT_KEY:?Set LW_JWT_KEY in .env}
      JwtSettings__ExpiryInMinutes: ${LW_JWT_EXPIRY_MINUTES:-5}
      LwServicesRoutes__CollectionsRoute: http://learnword.webapi:8080/collections
      LwServicesRoutes__CardsRoute: http://learnword.webapi:8080/cards
      LwServicesRoutes__WordsRoute: http://learnword.webapi:8080/cards
    expose:
      - "8080"
    depends_on:
      - learnword.webapi

  identityservice:
    image: ${LW_IMAGE_PREFIX:-learnword}/identityservice:${LW_IMAGE_TAG:?Set LW_IMAGE_TAG in .env}
    platform: ${LW_PLATFORM:-linux/amd64}
    hostname: identity
    networks:
      default:
        aliases:
          - identity
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__LwConnection: Host=${LW_DB_HOST:-192.168.0.6};Port=${LW_DB_PORT:-5432};Database=${LW_DB_NAME:-lwdb};Username=${LW_DB_USER:?Set LW_DB_USER in .env};Password=${LW_DB_PASSWORD:?Set LW_DB_PASSWORD in .env}
      JwtSettings__Issuer: ${LW_JWT_ISSUER:-LearnWordIdentity}
      JwtSettings__Audience: ${LW_JWT_AUDIENCE:-learnword.online}
      JwtSettings__Key: ${LW_JWT_KEY:?Set LW_JWT_KEY in .env}
      JwtSettings__ExpiryInMinutes: ${LW_JWT_EXPIRY_MINUTES:-5}
      JwtSettings__RefreshTokenTTL: ${LW_REFRESH_TOKEN_TTL:-7}
      Smtp__Host: ${LW_SMTP_HOST:-mail.learnword.online}
      Smtp__Port: ${LW_SMTP_PORT:-465}
      Smtp__UseSsl: ${LW_SMTP_USE_SSL:-true}
      Smtp__FromName: ${LW_SMTP_FROM_NAME:-Learn Word Online}
      Smtp__FromEmail: ${LW_SMTP_FROM_EMAIL:-register@learnword.online}
      Smtp__Username: ${LW_SMTP_USERNAME:?Set LW_SMTP_USERNAME in .env}
      Smtp__Password: ${LW_SMTP_PASSWORD:?Set LW_SMTP_PASSWORD in .env}
      Registration__EmailConfirmationUrl: ${LW_EMAIL_CONFIRMATION_URL:-https://learnword.online/confirm}
    expose:
      - "8080"

  gateway:
    image: ${LW_IMAGE_PREFIX:-learnword}/gateway:${LW_IMAGE_TAG:?Set LW_IMAGE_TAG in .env}
    platform: ${LW_PLATFORM:-linux/amd64}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      PUBLIC_PORT: ${LW_GATEWAY_PORT:-5000}
      JwtSettings__Issuer: ${LW_JWT_ISSUER:-LearnWordIdentity}
      JwtSettings__Audience: ${LW_JWT_AUDIENCE:-learnword.online}
      JwtSettings__Key: ${LW_JWT_KEY:?Set LW_JWT_KEY in .env}
      JwtSettings__ExpiryInMinutes: ${LW_JWT_EXPIRY_MINUTES:-5}
    ports:
      - "127.0.0.1:${LW_GATEWAY_PORT:-5000}:8080"
    depends_on:
      - learnword.webapi
      - learnword.identity
      - identityservice

  webapp:
    image: ${LW_IMAGE_PREFIX:-learnword}/webapp:${LW_IMAGE_TAG:?Set LW_IMAGE_TAG in .env}
    platform: ${LW_PLATFORM:-linux/amd64}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LW_WEBAPP_PORT:-8080}:80"
    depends_on:
      - gateway

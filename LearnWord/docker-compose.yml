version: '3.4'

services:
  learnword.webapi:
    image: ${DOCKER_REGISTRY-}learnwordwebapi
    hostname: learnword.webapi
    build:
      context: .
      dockerfile: LearnWord.WebApi/Dockerfile
    ports:
    - "5003:8080"
    environment:
      "PUBLIC_PORT": "5003"

  learnword.identity:
    image: ${DOCKER_REGISTRY-}learnwordidentity
    hostname: learnword.identity
    build:
      context: .
      dockerfile: LearnWord.Identity/Dockerfile
    ports:
    - "5002:8080"
    environment:
      "PUBLIC_PORT": "5002"

  identityservice:
    image: ${DOCKER_REGISTRY-}identityservice
    hostname: identity
    build:
      context: .
      dockerfile: IdentityService.WebApi/Dockerfile
    ports:
    - "5001:8080"
    environment:
      "PUBLIC_PORT": "5001"
      "ASPNETCORE_ENVIRONMENT": "Development"

  gateway:
    image: ${DOCKER_REGISTRY-}gateway
    hostname: gateway
    build:
      context: .
      dockerfile: LearnWord.Gateway/Dockerfile
    ports:
    - "5000:8080"
    environment:
      "PUBLIC_PORT": "5000"
    links:
    - learnword.webapi
    - learnword.identity
    - identityservice
    depends_on:
    - learnword.webapi
    - learnword.identity
    - identityservice
